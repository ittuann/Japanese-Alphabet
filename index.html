                { k: 'にゃ', w: 'にゃんこ', r: 'nya n ko', m: 'にゃんこ (猫咪)', tr: 'nya' }, { k: 'にゅ', w: 'ぎゅうにゅう', r: 'gyu u nyu u', m: '牛乳 (牛奶)', tr: 'nyu' }, { k: 'にょ', w: 'にょろにょろ', r: 'nyo ro nyo ro', m: 'にょろにょろ (弯曲貌)', tr: 'nyo' }
            ]},
            { rowHeader: 'h', words: [
                { k: 'ひゃ', w: 'ひゃく', r: 'hya ku', m: '百 (一百)', tr: 'hya' }, { k: 'ひゅ', w: 'ひゅーひゅー', r: 'hyu u hyu u', m: 'ひゅーひゅー (呼呼声)', tr: 'hyu' }, { k: 'ひょ', w: 'ひょう', r: 'hyo u', m: '豹 (豹)', tr: 'hyo' }
            ]},
            { rowHeader: 'm', words: [
                { k: 'みゃ', w: 'みゃく', r: 'mya ku', m: '脈 (脉搏)', tr: 'mya' }, { k: 'みゅ', w: 'みゅーじっく', r: 'myu u ji k ku', m: 'ミュージック (音乐)', tr: 'myu' }, { k: 'みょ', w: 'みょうじ', r: 'myo u ji', m: '名字 (姓氏)', tr: 'myo' }
            ]},
            { rowHeader: 'r', words: [
                { k: 'りゃ', w: 'りゃく', r: 'rya ku', m: '略 (省略)', tr: 'rya' }, { k: 'りゅ', w: 'りゅう', r: 'ryu u', m: '竜 (龙)', tr: 'ryu' }, { k: 'りょ', w: 'りょこう', r: 'ryo ko u', m: '旅行 (旅行)', tr: 'ryo' }
            ]},
            { rowHeader: 'g', words: [
                { k: 'ぎゃ', w: 'ぎゃく', r: 'gya ku', m: '逆 (相反)', tr: 'gya' }, { k: 'ぎゅ', w: 'ぎゅうにく', r: 'gyu u ni ku', m: '牛肉 (牛肉)', tr: 'gyu' }, { k: 'ぎょ', w: 'きんぎょ', r: 'ki n gyo', m: '金魚 (金鱼)', tr: 'gyo' }
            ]},
            { rowHeader: 'j', words: [
                { k: 'じゃ', w: 'じゃま', r: 'ja ma', m: '邪魔 (打扰)', tr: 'ja' }, { k: 'じゅ', w: 'じゅぎょう', r: 'ju gyo u', m: '授業 (课)', tr: 'ju' }, { k: 'じょ', w: 'じょせい', r: 'jo se i', m: '女性 (女性)', tr: 'jo' }
            ]},
            { rowHeader: 'b', words: [
                { k: 'びゃ', w: 'さんびゃく', r: 'sa n bya ku', m: '三百 (三百)', tr: 'bya' }, { k: 'びゅ', w: 'びゅんびゅん', r: 'byu n byu n', m: 'びゅんびゅん (嗖嗖声)', tr: 'byu' }, { k: 'びょ', w: 'びょういん', r: 'byo u i n', m: '病院 (医院)', tr: 'byo' }
            ]},
            { rowHeader: 'p', words: [
                { k: 'ぴゃ', w: 'ろっぴゃく', r: 'ro p pya ku', m: '六百 (六百)', tr: 'pya' }, { k: 'ぴゅ', w: 'こんぴゅーた', r: 'ko n pyu u ta', m: 'コンピュータ (电脑)', tr: 'pyu' }, { k: 'ぴょ', w: 'はっぴょう', r: 'ha p pyo u', m: '発表 (发表)', tr: 'pyo' }
            ]}
        ];

        document.addEventListener("DOMContentLoaded", () => {
            // 封装渲染假名表格的函数
            function renderTable(headId, bodyId, headerVowels, data) {
                const tableHead = document.getElementById(headId);
                const tableBody = document.getElementById(bodyId);

                // 生成表头 (Thead)
                let theadHtml = '<tr><th class="w-6 sm:w-8"></th>';
                headerVowels.forEach(v => {
                    theadHtml += `<th class="p-1 text-center text-slate-400 font-mono text-xs sm:text-sm font-medium">${v}</th>`;
                });
                theadHtml += '</tr>';
                tableHead.innerHTML = theadHtml;

                // 生成表格主体 (Tbody)
                let tbodyHtml = '';
                data.forEach(rowData => {
                    tbodyHtml += `<tr>`;
                    // 行侧边表头
                    tbodyHtml += `<th class="p-1 text-center text-slate-400 font-mono text-xs sm:text-sm font-medium align-middle">${rowData.rowHeader}</th>`;

                    // 生成单元格
                    rowData.chars.forEach(charData => {
                        if (charData) {
                            tbodyHtml += `
                                <td class="h-full">
                                    <div class="bg-white border border-slate-200 rounded-md shadow-sm hover:border-indigo-300 transition-colors p-1.5 flex flex-col items-center justify-center min-w-[50px] sm:min-w-[60px] h-full">
                                        <div class="flex w-full justify-center gap-1.5 mb-0.5">
                                            <span class="text-base sm:text-xl font-medium text-blue-600 font-japanese">${charData.h}</span>
                                            <span class="text-base sm:text-xl font-medium text-red-600 font-japanese">${charData.k}</span>
                                        </div>
                                        <div class="text-[9px] sm:text-[10px] text-slate-500 font-mono tracking-widest bg-slate-50 px-1 py-0 rounded">${charData.r}</div>
                                    </div>
                                </td>
                            `;
                        } else {
                            tbodyHtml += `<td class="empty-cell"></td>`;
                        }
                    });
                    tbodyHtml += `</tr>`;
                });
                tableBody.innerHTML = tbodyHtml;
            }

            // 执行渲染假名表
            renderTable('table-head', 'table-body', vowels, gojuonData);
            renderTable('dakuon-table-head', 'dakuon-table-body', vowels, dakuonData);
            renderTable('yoon-table-head', 'yoon-table-body', yoonVowels, yoonData);

            // 封装渲染词汇记忆表格的函数
            function renderVocabTable(headId, bodyId, headerVowels, data) {
                const head = document.getElementById(headId);
                const body = document.getElementById(bodyId);

                // 表头
                let theadHtml = '<tr><th class="w-6 sm:w-8"></th>';
                headerVowels.forEach(v => {
                    theadHtml += `<th class="p-1 text-center text-slate-400 font-mono text-xs sm:text-sm font-medium">${v}</th>`;
                });
                theadHtml += '</tr>';
                head.innerHTML = theadHtml;

                // 表体
                let tbodyHtml = '';
                data.forEach(rowData => {
                    tbodyHtml += `<tr>`;
                    tbodyHtml += `<th class="p-1 text-center text-slate-400 font-mono text-xs sm:text-sm font-medium align-middle">${rowData.rowHeader}</th>`;

                    rowData.words.forEach(wordData => {
                        if (wordData) {
                            const highlightedW = wordData.w.split(wordData.k).join(`<span class="text-green-600 font-bold">${wordData.k}</span>`);
                            const highlightedR = wordData.r.split(' ').map(s =>
                                s === wordData.tr ? `<span class="text-green-600 font-bold">${s}</span>` : s
                            ).join(' ');

                            tbodyHtml += `
                                <td class="h-full">
                                    <div class="bg-white border border-slate-200 rounded-md shadow-sm hover:border-green-300 transition-colors p-1.5 sm:p-2 flex flex-col items-center justify-between min-w-[80px] sm:min-w-[95px] h-full relative">
                                        <span class="absolute top-1 left-1 text-[8px] font-bold text-green-600 bg-green-50 px-1 py-0 rounded">${wordData.k}</span>

                                        <div class="flex flex-col items-center mt-2 mb-1 w-full">
                                            <div class="text-[8px] text-slate-400 font-mono tracking-tighter mb-0.5 line-clamp-1 w-full text-center">${highlightedR}</div>
                                            <div class="text-sm sm:text-base font-medium text-slate-800 font-japanese mb-0.5 whitespace-nowrap">${highlightedW}</div>
                                            <div class="text-[9px] sm:text-[10px] text-slate-500 text-center leading-tight whitespace-nowrap">${wordData.m}</div>
                                        </div>

                                        <div class="text-[8px] sm:text-[9px] text-slate-500 font-mono bg-slate-50 px-1 py-0 rounded border border-slate-100 mt-auto">${wordData.tr}</div>
                                    </div>
                                </td>
                            `;
                        } else {
                            tbodyHtml += `<td class="empty-cell"></td>`;
                        }
                    });
                    tbodyHtml += `</tr>`;
                });
                body.innerHTML = tbodyHtml;
            }

            // 执行渲染词汇表
            renderVocabTable('vocab-table-head', 'vocab-table-body', vowels, allKanaVocabData);
            renderVocabTable('dakuon-vocab-table-head', 'dakuon-vocab-table-body', vowels, dakuonVocabData);
            renderVocabTable('yoon-vocab-table-head', 'yoon-vocab-table-body', yoonVowels, yoonVocabData);
        });
    </script>
